name: flutter_dummyjson_app
description: A Flutter application using DummyJSON API with Clean Architecture and BLoC.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0

  # Local Caching
  shared_preferences: ^2.2.2

  # Dependency Injection
  get_it: ^7.6.4

  # Navigation
  go_router: ^13.0.0

  # Image
  cached_network_image: ^3.3.1

  # Functional Programming
  dartz: ^0.10.1

  # Connectivity
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
